name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: lint (fmt + clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt, clippy

      - name: cargo fmt --check
        run: cargo fmt --check

      - name: cargo clippy -- -D warnings
        run: cargo clippy -- -D warnings

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: cargo test
        run: cargo test

  codegen-check:
    name: codegen-check (TS freshness)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Regenerate TypeScript types
        run: cargo run --bin generate-ts

      - name: Fail if generated/types.ts is stale
        run: |
          if ! git diff --exit-code generated/types.ts; then
            echo "ERROR: generated/types.ts is out of date."
            echo "Run 'cargo run --bin generate-ts' locally and commit the result."
            exit 1
          fi

  openapi-lint:
    name: openapi-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate OpenAPI schema
        run: npx --yes @redocly/cli lint schema/openapi.yaml
